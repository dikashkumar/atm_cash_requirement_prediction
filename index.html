<!DOCTYPE html>
<html>
<head>

<title>ATM Cash Requirement Prediction</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

.container{
background:white;
padding:20px;
max-width:700px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
background:#1565c0;
color:white;
border:none;
}

.result{
margin-top:20px;
background:#e8f5e9;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>ATM Cash Requirement Prediction</h1>

<form method="POST">

<input
type="text"
name="atm_id"
placeholder="ATM ID"
required>

<input
type="number"
name="total_cash"
placeholder="Current ATM Total Cash"
required>

<input
type="number"
name="withdrawal"
placeholder="Today's Withdrawal Amount"
required>

<button type="submit">
Predict
</button>

</form>

{% if prediction %}

<div class="result">

<h3>Prediction Result</h3>

<p>
<b>ATM ID:</b>
{{ atm_id }}
</p>

<p>
<b>Total Cash:</b>
₹{{ total_cash }}
</p>

<p>
<b>Withdrawal:</b>
₹{{ withdrawal }}
</p>

<p>
<b>Balance Amount:</b>
₹{{ balance }}
</p>

<p>
<b>Required Cash Refill:</b>
₹{{ prediction }}
</p>

</div>

{% endif %}

</div>

</body>
</html>
